<mat-card>
  <h1>Vehicules</h1>
  @if (loading()) {
    <div class="loading"><mat-spinner diameter="36"></mat-spinner></div>
  } @else {
    <table mat-table [dataSource]="vehicles()">
      <ng-container matColumnDef="registration">
        <th mat-header-cell *matHeaderCellDef>Immatriculation</th>
        <td mat-cell *matCellDef="let row">{{ row.registration }}</td>
      </ng-container>
      <ng-container matColumnDef="brand">
        <th mat-header-cell *matHeaderCellDef>Marque</th>
        <td mat-cell *matCellDef="let row">{{ row.brand }}</td>
      </ng-container>
      <ng-container matColumnDef="model">
        <th mat-header-cell *matHeaderCellDef>Modele</th>
        <td mat-cell *matCellDef="let row">{{ row.model }}</td>
      </ng-container>
      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Statut</th>
        <td mat-cell *matCellDef="let row">{{ row.status }}</td>
      </ng-container>
      <ng-container matColumnDef="currentMileage">
        <th mat-header-cell *matHeaderCellDef>Kilometrage</th>
        <td mat-cell *matCellDef="let row">{{ row.currentMileage }} km</td>
      </ng-container>
      <ng-container matColumnDef="insuranceExpiry">
        <th mat-header-cell *matHeaderCellDef>Assurance</th>
        <td mat-cell *matCellDef="let row">{{ row.insuranceExpiry | date:'dd/MM/yyyy' }}</td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  }
</mat-card>
