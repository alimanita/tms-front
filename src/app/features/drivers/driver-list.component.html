<mat-card>
  <h1>Chauffeurs</h1>
  @if (loading()) {
    <div class="loading"><mat-spinner diameter="36"></mat-spinner></div>
  } @else {
    <table mat-table [dataSource]="drivers()">
      <ng-container matColumnDef="fullName"><th mat-header-cell *matHeaderCellDef>Nom</th><td mat-cell *matCellDef="let row">{{ row.fullName }}</td></ng-container>
      <ng-container matColumnDef="phone"><th mat-header-cell *matHeaderCellDef>Telephone</th><td mat-cell *matCellDef="let row">{{ row.phone }}</td></ng-container>
      <ng-container matColumnDef="licenseNumber"><th mat-header-cell *matHeaderCellDef>Permis</th><td mat-cell *matCellDef="let row">{{ row.licenseNumber }}</td></ng-container>
      <ng-container matColumnDef="licenseExpiry"><th mat-header-cell *matHeaderCellDef>Expiration</th><td mat-cell *matCellDef="let row">{{ row.licenseExpiry | date:'dd/MM/yyyy' }}</td></ng-container>
      <ng-container matColumnDef="salary"><th mat-header-cell *matHeaderCellDef>Salaire</th><td mat-cell *matCellDef="let row">{{ row.salary }} EUR</td></ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  }
</mat-card>
