<mat-card>
  <h1>Clients</h1>
  @if (loading()) {
    <div class="loading"><mat-spinner diameter="36"></mat-spinner></div>
  } @else {
    <table mat-table [dataSource]="customers()">
      <ng-container matColumnDef="name"><th mat-header-cell *matHeaderCellDef>Nom</th><td mat-cell *matCellDef="let row">{{ row.name }}</td></ng-container>
      <ng-container matColumnDef="company"><th mat-header-cell *matHeaderCellDef>Societe</th><td mat-cell *matCellDef="let row">{{ row.company }}</td></ng-container>
      <ng-container matColumnDef="phone"><th mat-header-cell *matHeaderCellDef>Telephone</th><td mat-cell *matCellDef="let row">{{ row.phone }}</td></ng-container>
      <ng-container matColumnDef="email"><th mat-header-cell *matHeaderCellDef>Email</th><td mat-cell *matCellDef="let row">{{ row.email }}</td></ng-container>
      <ng-container matColumnDef="city"><th mat-header-cell *matHeaderCellDef>Ville</th><td mat-cell *matCellDef="let row">{{ row.city }}</td></ng-container>
      <ng-container matColumnDef="country"><th mat-header-cell *matHeaderCellDef>Pays</th><td mat-cell *matCellDef="let row">{{ row.country }}</td></ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  }
</mat-card>
